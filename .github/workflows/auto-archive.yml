name: Auto Archive Old Forecast

on:
  push:
    branches:
      - main
    paths:
      - forecast-data.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Archive Engine
        run: node archive.js

      - name: Commit and Push if archive changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add archive-data.js

          if git diff --cached --quiet; then
            echo "No archive changes."
          else
            git commit -m "🥋 Auto archive previous forecast [skip ci]"
            git push
          fi
