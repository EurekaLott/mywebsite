<!-- BANNER SIÊU NHỎ -->
<div style="width:100%; max-width:520px; height:100px; margin:10px auto; overflow:hidden; background:#000; border:1px solid #8A2BE2; border-radius:8px; position:relative;">
  <canvas id="s" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
  <img id="b" src="https://i.imgur.com/0Z8vXbJ.png" style="position:absolute;bottom:8px;left:-50px;width:70px;">
</div>

<script>
const c = document.getElementById('s');
const ctx = c.getContext('2d');
c.width = 520; c.height = 100;

let stars = [];
for(let i=0;i<180;i++) stars.push({x:Math.random()*520,y:Math.random()*100,size:Math.random()*2,speed:Math.random()*2+0.8});

function loop(){
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(0,0,520,100);
  ctx.fillStyle='#fff';
  stars.forEach(s=>{ ctx.fillRect(s.x,s.y,s.size,s.size); s.x-=s.speed; if(s.x<0)s.x=520; });
  requestAnimationFrame(loop);
}
loop();

const b = document.getElementById('b');
let x = -50;
setInterval(()=>{ x+=5.5; b.style.left = x+'px'; if(x>580) x=-50; }, 35);
</script>
