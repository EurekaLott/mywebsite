<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bruce Lee Vũ Trụ</title>
  <style>
    body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let stars = [];
    for (let i = 0; i < 800; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 3,
        speed: Math.random() * 1.5 + 0.5
      });
    }

    let x = -100;
    let frame = 0;

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Sao bay
      ctx.fillStyle = '#ffffff';
      stars.forEach(s => {
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.x -= s.speed;
        if (s.x < 0) s.x = canvas.width;
      });

      // Bruce Lee đơn giản
      frame++;
      ctx.fillStyle = '#ffdbac';           // da
      ctx.fillRect(x + 30, 180, 40, 40);   // đầu

      ctx.fillStyle = '#ffd700';           // áo vàng
      ctx.fillRect(x + 25, 220, 50, 70);   // thân

      ctx.fillStyle = '#222';              // quần
      ctx.fillRect(x + 28, 285, 18, 50);   // chân trái
      ctx.fillRect(x + 52, 285, 18, 50);   // chân phải

      // Tay đấm
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(x + 70, 230 + Math.sin(frame/6)*8, 35, 18);

      x += 3.5;
      if (x > canvas.width + 100) x = -100;

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
