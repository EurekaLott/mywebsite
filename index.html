<!-- BANNER BRUCE LEE NHỎ -->
<div style="position:relative; width:100%; max-width:620px; height:160px; margin:15px auto; overflow:hidden; background:linear-gradient(#000, #001133); border-radius:10px; box-shadow:0 0 15px rgba(138,43,226,0.5);">
  <canvas id="stars" style="position:absolute; top:0; left:0; width:100%; height:100%;"></canvas>
  <img id="bruce" src="https://i.imgur.com/0Z8vXbJ.png" style="position:absolute; bottom:20px; left:-60px; width:90px;" alt="Bruce Lee">
</div>

<script>
// Sao bay
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = 620;
canvas.height = 160;

let stars = [];
for (let i = 0; i < 250; i++) {
  stars.push({x: Math.random()*620, y: Math.random()*160, size: Math.random()*2 + 0.5, speed: Math.random()*2 + 0.8});
}

function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0,0,620,160);
  ctx.fillStyle = '#fff';
  stars.forEach(s => {
    ctx.fillRect(s.x, s.y, s.size, s.size);
    s.x -= s.speed;
    if (s.x < 0) s.x = 620;
  });
  requestAnimationFrame(animate);
}
animate();

// Bruce di chuyển
const bruce = document.getElementById('bruce');
let pos = -60;
setInterval(() => {
  pos += 6;
  bruce.style.left = pos + 'px';
  if (pos > 680) pos = -60;
}, 40);
</script>
