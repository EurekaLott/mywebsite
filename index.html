<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bruce Lee Vũ Trụ</title>
  <style>
    body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
    #bruce { position:absolute; bottom:20%; left:-150px; width:180px; transition: left 0.1s linear; }
  </style>
</head>
<body>
  <canvas id="stars" style="position:absolute; top:0; left:0; width:100%; height:100%;"></canvas>
  <img id="bruce" src="https://i.imgur.com/0Z8vXbJ.png" alt="Bruce Lee">

  <script>
    // Vũ trụ sao
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

    let stars = [];
    for (let i = 0; i < 1200; i++) {
      stars.push({x: Math.random()*w, y: Math.random()*h, size: Math.random()*2.5, speed: Math.random()*2 + 0.6});
    }

    function drawStars() {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(0,0,w,h);
      ctx.fillStyle = '#fff';
      stars.forEach(s => {
        ctx.fillRect(s.x, s.y, s.size, s.size);
        s.x -= s.speed;
        if (s.x < 0) s.x = w;
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();

    // Bruce Lee di chuyển
    const bruce = document.getElementById('bruce');
    let pos = -180;

    setInterval(() => {
      pos += 6;
      bruce.style.left = pos + 'px';

      if (pos > window.innerWidth + 100) pos = -180;
    }, 30);
  </script>
</body>
</html>
